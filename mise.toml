[tools]
"ubi:evaera/moonwave" = "1.3.0"
node = "25"
pnpm = "9.1.4"

[tasks.generate]
run = "pnpm generate"
description = "Generate API reference docs from moonwave"

[tasks.dev]
run = "pnpm dev"
description = "Start the dev server"

[tasks.build]
run = "pnpm generate && pnpm build"
description = "Generate and build the docs site"

[tasks.deploy]
run = 'pnpm run deploy "$@"'
description = "Deploy to deno deploy"

[tasks.check]
run = "pnpm run check"
description = "Run code checks"

[settings]
experimental = true
lockfile = true
