[tools]
"ubi:evaera/moonwave" = "1.3.0"
deno = "2"
node = "25"
pnpm = "9.1.4"

[tasks.generate]
run = "pnpm generate"
description = "Generate API reference docs from moonwave"

[tasks.dev]
run = "pnpm dev"
description = "Start the dev server"

[tasks.build]
run = "pnpm build"
description = "Build the docs site"

[tasks.deploy]
run = "pnpm run deploy {{args}}"
description = "Deploy to deno deploy"

[settings]
experimental = true
lockfile = true
