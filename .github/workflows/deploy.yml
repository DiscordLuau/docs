name: Deploy
on:
  push:
    branches: 
      - master
      - dev
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.github/dependabot.yml'
  pull_request:
    branches: master
  repository_dispatch:
    types: [deploy]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install tooling
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies and build directory
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.STORE_PATH }}
            dist
            .astro
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', 'package.json') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GH_SECRET }}
        run: mise run build

      - name: Get deployment info
        uses: actions/github-script@v9
        id: deployment-info
        with:
          result-encoding: string
          script: |
            return context.ref === 'refs/heads/master' ? 'production' : 'preview'

      - name: Upload build artifact
        if: github.event_name != 'pull_request'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: mise run deploy --env ${{ steps.deployment-info.outputs.result }} 
