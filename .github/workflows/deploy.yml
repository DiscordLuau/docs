name: Deploy
on:
  push:
    branches: master
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.github/dependabot.yml'
  pull_request_target:
    branches: master
  repository_dispatch:
    types: [deploy]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          submodules: true
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}

      - name: Install tooling
        uses: jdx/mise-action@v4
        with:
          cache: true

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies and build directory
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.STORE_PATH }}
            dist
            .astro
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', 'package.json') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GH_SECRET }}
        run: mise run build

      - name: Get deployment info
        uses: actions/github-script@v9
        id: deployment-info
        with:
          script: |
            const sha = context.sha.slice(0, 7);
            const headCommit = context.payload.head_commit?.message?.split('\n')[0];
            const prTitle = context.payload.pull_request?.title;
            const message = headCommit || prTitle || '';
            const commit = message ? `${message} (${sha})` : sha;
            const alias = `pr-${context.payload.pull_request?.number}`;

            core.setOutput('commit-message', `--message '${commit}'`);
            core.setOutput('wrangler-command', context.eventName === 'pull_request_target' ? 'versions upload' : 'deploy');
            core.setOutput('preview-alias', context.eventName === 'pull_request_target' ? `--preview-alias ${alias}` : '');

      - name: Upload build artifact
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          OUTPUT=$(pnpm wrangler \
            ${{ steps.deployment-info.outputs.wrangler-command }} \
            ${{ steps.deployment-info.outputs.commit-message }} \
            ${{ steps.deployment-info.outputs.preview-alias }} | tee /dev/stderr)
          
          echo "version-id=$(echo "$OUTPUT" | grep -oP 'Worker Version ID: \K\S+')" >> $GITHUB_OUTPUT
          echo "preview-url=$(echo "$OUTPUT" | grep -oP 'Version Preview URL: \K\S+')" >> $GITHUB_OUTPUT
          echo "alias-url=$(echo "$OUTPUT" | grep -oP 'Version Preview Alias URL: \K\S+')" >> $GITHUB_OUTPUT

      - name: Comment deployment info
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const sha = context.sha.slice(0, 7);
            const aliasUrl = '${{ steps.deploy.outputs.alias-url }}';
            const previewUrl = '${{ steps.deploy.outputs.preview-url }}';
            const versionId = '${{ steps.deploy.outputs.version-id }}';

            const commitUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}`;
            const newRow = `| [\`${sha}\`](${commitUrl}) | [\`${versionId}\`](${previewUrl}) |`;

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: pr,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existingComment = comments.find(c => c.user.login === 'github-actions[bot]' && c.body.includes('Preview deployment ready'));

            if (existingComment) {
              const updatedBody = existing.body + '\n' + newRow;
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: updatedBody,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: pr,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: [
                  '🚀 Preview deployment ready',
                  '',
                  `**Pull Request Preview**: ${aliasUrl}`,
                  '',
                  '| Commit | Preview Deployment |',
                  '|---|---|',
                  newRow,
                ].join('\n')
              });
            }
