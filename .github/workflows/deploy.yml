name: Deploy
on:
  push:
    branches: master
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.github/dependabot.yml'
  pull_request_target:
    branches: master
  repository_dispatch:
    types: [deploy]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          submodules: true
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}

      - name: Install tooling
        uses: jdx/mise-action@v4
        with:
          cache: true

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies and build directory
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.STORE_PATH }}
            dist
            .astro
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', 'package.json') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GH_SECRET }}
        run: mise run build

      - name: Get deployment info
        uses: actions/github-script@v9
        id: deployment-info
        with:
          script: |
            const sha = context.sha.slice(0, 7);
            const headCommit = context.payload.head_commit?.message?.split('\n')[0];
            const prTitle = context.payload.pull_request?.title;
            const message = headCommit || prTitle || '';
            const commit = message ? `${message} (${sha})` : sha;
            const alias = `pr-${context.payload.pull_request?.number}`;

            core.setOutput('commit-message', `--message '${commit}'`);
            core.setOutput('wrangler-command', context.eventName === 'pull_request_target' ? 'versions upload' : 'deploy');
            core.setOutput('preview-alias', context.eventName === 'pull_request_target' ? `--preview-alias ${alias}` : '');

      - name: Upload build artifact
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler \
            ${{ steps.deployment-info.outputs.wrangler-command }} \
            ${{ steps.deployment-info.outputs.commit-message }} \
            ${{ steps.deployment-info.outputs.preview-alias }} 
